spring.application.name=cloud-storage-api
server.port=8080

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/alicia_cloud_storage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.flyway.baseline-on-migrate=true

spring.servlet.multipart.max-file-size=1024MB
spring.servlet.multipart.max-request-size=1024MB

alicia.auth.token-secret=${ALICIA_AUTH_TOKEN_SECRET:alicia-cloud-storage-dev-secret-change-me}
alicia.auth.token-expire-seconds=${ALICIA_AUTH_TOKEN_EXPIRE_SECONDS:604800}
alicia.cos.secret-id=${ALICIA_COS_SECRET_ID:}
alicia.cos.secret-key=${ALICIA_COS_SECRET_KEY:}
alicia.cos.region=${ALICIA_COS_REGION:ap-shanghai}
alicia.cos.bucket=${ALICIA_COS_BUCKET:}
alicia.cos.max-file-size-bytes=${ALICIA_COS_MAX_FILE_SIZE_BYTES:1073741824}
alicia.storage.total-space-bytes=${ALICIA_STORAGE_TOTAL_SPACE_BYTES:1073741824}
alicia.storage.default-user-quota-bytes=${ALICIA_STORAGE_DEFAULT_USER_QUOTA_BYTES:536870912}
alicia.multipart-upload.cleanup-enabled=${ALICIA_MULTIPART_UPLOAD_CLEANUP_ENABLED:true}
alicia.multipart-upload.stale-hours=${ALICIA_MULTIPART_UPLOAD_STALE_HOURS:24}
alicia.multipart-upload.cleanup-fixed-delay-ms=${ALICIA_MULTIPART_UPLOAD_CLEANUP_FIXED_DELAY_MS:3600000}
alicia.multipart-upload.cleanup-initial-delay-ms=${ALICIA_MULTIPART_UPLOAD_CLEANUP_INITIAL_DELAY_MS:300000}
